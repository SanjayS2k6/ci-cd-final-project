name: CI Pipeline

on: push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install flake8 pytest

    - name: Lint
      run: flake8 . || true

    - name: Run tests
      run: pytest || true
